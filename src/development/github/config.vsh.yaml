name: github
description: |
  Query GitHub for development activity over a given time window.
  Collects merged pull requests, new releases/tags, and commit
  activity for a set of repositories. Produces a structured report.

argument_groups:
  - name: Connection
    arguments:
      - name: --token
        type: string
        description: |
          GitHub personal access token. Can also be provided via
          the GITHUB_TOKEN environment variable.
        required: false
      - name: --api_url
        type: string
        description: |
          GitHub API base URL. Override for GitHub Enterprise instances.
        default: "https://api.github.com"

  - name: Repositories
    arguments:
      - name: --repos
        type: string
        multiple: true
        description: |
          Repositories to query, as owner/repo
          (e.g. viash-io/openpipeline viash-io/viash).
        required: true
        example: "viash-io/openpipeline"
      - name: --default_branch
        type: string
        description: |
          Default branch name. Used for commit counting when not
          otherwise detectable.
        default: main

  - name: Time Window
    arguments:
      - name: --days
        type: integer
        description: Number of days to look back from today.
        default: 7
      - name: --from_date
        type: string
        description: |
          Start date (ISO 8601, e.g. 2026-04-09). Overrides --days
          when used together with --to_date.
        required: false
      - name: --to_date
        type: string
        description: |
          End date (ISO 8601, e.g. 2026-04-16). Defaults to today.
        required: false

  - name: Outputs
    arguments:
      - name: --output
        type: file
        direction: output
        description: Report output file (Markdown).
        default: development_report.md
      - name: --output_json
        type: file
        direction: output
        description: Raw data output (JSON) for downstream processing.
        required: false
        default: development_report.json

resources:
  - type: python_script
    path: script.py

engines:
  - type: docker
    image: python:3.12-slim
    setup:
      - type: apt
        packages:
          - procps
      - type: python
        packages:
          - requests

runners:
  - type: executable
  - type: nextflow
