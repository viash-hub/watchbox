name: seqera_workspaces
description: |
  List organizations and workspaces from a Seqera Platform instance
  with their numeric IDs. Useful for discovering the workspace ID
  required by the seqera component.

argument_groups:
  - name: Connection
    arguments:
      - name: --base_url
        type: string
        description: |
          Base URL of the Seqera Platform API
          (e.g. https://api.cloud.seqera.io).
        required: true
        example: "https://api.cloud.seqera.io"
      - name: --token
        type: string
        description: |
          Seqera Platform API access token. Can also be provided via
          the TOWER_ACCESS_TOKEN environment variable.
        required: false

  - name: Filtering
    arguments:
      - name: --org
        type: string
        description: |
          Filter by organization name. When provided, only workspaces
          from this organization are listed.
        required: false

  - name: Outputs
    arguments:
      - name: --output
        type: file
        direction: output
        description: Report output file (Markdown).
        default: seqera_workspaces.md
      - name: --output_json
        type: file
        direction: output
        description: Raw data output (JSON) for downstream processing.
        required: false
        default: seqera_workspaces.json

resources:
  - type: python_script
    path: script.py
  - path: test_script.py

engines:
  - type: docker
    image: python:3.12-slim
    setup:
      - type: apt
        packages:
          - procps
      - type: python
        packages:
          - requests

runners:
  - type: executable
  - type: nextflow
